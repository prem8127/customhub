services:
  postgres:
    image: postgres:16-alpine
    container_name: customhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: customhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - customhub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customhub"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: customhub-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/customhub
      FRONTEND_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: change-this-access-secret
      JWT_REFRESH_SECRET: change-this-refresh-secret
      COOKIE_SECRET: change-this-cookie-secret
    ports:
      - "5001:5001"

volumes:
  customhub-postgres:
